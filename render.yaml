services:
  - type: web
    name: ai-issue-solver-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_OWNER
        sync: false
      - key: GITHUB_REPO
        sync: false
      - key: GITHUB_BASE_BRANCH
        value: main
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGIN
        value: https://ai-issue-solver-frontend.onrender.com

  - type: web
    name: ai-issue-solver-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_BASE_URL
        value: https://ai-issue-solver-backend.onrender.com
